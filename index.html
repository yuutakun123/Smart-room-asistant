<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant Room Dashboard</title>
    <!-- Library Chart.js Resmi (Sudah Diperbaiki & Valid) -->
   <script src="https://jsdelivr.net"></script>
    <style>
        /* --- GLOBAL & LAYOUT SYSTEM --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: #f1f5f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 30px 20px;
        }

        /* --- DASHBOARD WRAPPER --- */
        .dashboard-container {
            background: #ffffff;
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.08);
            max-width: 900px;
            width: 100%;
            border: 1px solid #e2e8f0;
        }

        /* --- HEADER SECTION --- */
        .header {
            text-align: left;
            margin-bottom: 30px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { 
            color: #0f172a; 
            font-size: 26px; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .sub { 
            color: #64748b; 
            font-size: 13px; 
            font-weight: 500;
            margin-top: 4px;
        }

        /* --- GRID SYSTEM --- */
        .main-grid {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 25px;
            margin-bottom: 25px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }

        /* --- LEFT COLUMN: CORE SENSOR --- */
        .suhu-box { 
            background: #f8fafc; 
            border-radius: 20px; 
            padding: 40px 25px; 
            border: 2px solid #e2e8f0; 
            text-align: center;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .suhu-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            border-radius: 20px 20px 0 0;
        }
        .suhu-label {
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        .suhu { 
            font-size: 72px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -2px;
            line-height: 1;
        }
        .status { 
            margin-top: 25px; 
            font-size: 13px; 
            color: #64748b; 
            font-weight: 700; 
            padding: 8px 16px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #e2e8f0;
            display: inline-block;
        }

        /* --- RIGHT COLUMN: CONTROLS & MINI CARDS --- */
        .right-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .mini-card-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .mini-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .mini-label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .mini-value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
        }

        /* Panels */
        .panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 20px;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 800;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        /* Switch Toggle Design */
        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .control-item:last-child { border: none; }
        .control-item span {
            font-size: 14px;
            font-weight: 600;
            color: #475569;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #cbd5e1; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- BUTTON SYSTEM --- */
        .btn-suara { 
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 700; 
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transition: all 0.2s ease;
        }
        .btn-suara:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        /* --- CONTAINER KARTU GRAFIK --- */
        .chart-container {
            width: 100%;
            height: 220px;
            position: relative;
            margin-top: 10px;
        }
    </style>
</head>
<body onload="initChart(); ambilDataSuhu();">

    <div class="dashboard-container">
        <!-- HEADER UTAMA -->
        <div class="header">
            <div>
                <h1>Smart Assistant Room</h1>
                <div class="sub">Sistem Pengendalian Nyata Berbasis Web IoT (Vercel)</div>
            </div>
            <button class="btn-suara" id="btnAktif" onclick="aktifkanAsisten()">🔊 Aktifkan Suara Asisten</button>
        </div>

        <!-- TATA LETAK GRID ATAS -->
        <div class="main-grid">
            <!-- SENSOR ASLI -->
            <div class="suhu-box">
                <div class="suhu-label">Sensors Live Stream</div>
                <div class="suhu" id="displaySuhu">-- °C</div>
                <div class="status" id="statusKondisi">Menghubungkan ke server...</div>
            </div>

            <!-- PANEL KENDALIAN & STATS -->
            <div class="right-column">
                <div class="mini-card-row">
                    <div class="mini-card">
                        <span class="mini-label">📶 Sinyal ESP8266</span>
                        <span class="mini-value" style="color: #2ecc71;">94% Excellent</span>
                    </div>
                    <div class="mini-card">
                        <span class="mini-label">💧 Kelembapan (Est)</span>
                        <span class="mini-value">58.2 % Rh</span>
                    </div>
                </div>

                <div class="panel">
                    <div class="panel-title">🛠️ Kontrol Perangkat Ruangan</div>
                    <div class="control-item">
                        <span>Status Kipas Angin / AC</span>
                        <label class="switch">
                            <input type="checkbox" id="switchKipas">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="control-item">
                        <span>Sakelar Lampu Utama</span>
                        <label class="switch">
                            <input type="checkbox" id="switchLampu">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL GRAFIK DI BAGIAN BAWAH -->
        <div class="panel">
            <div class="panel-title">📈 Grafik Riwayat Tren Suhu Real-Time</div>
            <div class="chart-container">
                <canvas id="liveSuhuChart"></canvas>
            </div>
        </div>
    </div>

    <!-- LOGIC SCRIPT IoT & LIVE UPDATE CHART -->
    <script>
        let alarmSudahBunyi = false;
        let suhuChart;
        const maxDataPoints = 10; 

        // Inisialisasi Grafik saat pertama kali web dibuka
                // Inisialisasi Grafik standar terbaru
        function initChart() {
            const ctx = document.getElementById('liveSuhuChart').getContext('2d');
            suhuChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [], 
                    datasets: [{
                        label: 'Suhu (°C)',
                        data: [], 
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#3b82f6',
                        pointRadius: 4,
                        tension: 0.3, 
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    // Penulisan skala yang aman untuk Chart.js lokal
                    scales: {
                        y: {
                            min: 15,
                            max: 45
                        }
                    }
                }
            });
        }


        // Menambahkan titik data baru ke grafik secara real-time
        function updateChartData(nilaiSuhu) {
            if (!suhuChart) return;

            const waktuSekarang = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            suhuChart.data.labels.push(waktuSekarang);
            suhuChart.data.datasets.data.push(nilaiSuhu);

            // Geser grafik jika data sudah melewati batas maksimal
            if (suhuChart.data.labels.length > maxDataPoints) {
                suhuChart.data.labels.shift();
                suhuChart.data.datasets.data.shift();
            }

            suhuChart.update();
        }

        function asistenBerbicara(teks) {
            let ucapan = new SpeechSynthesisUtterance(teks);
            ucapan.lang = 'id-ID';
            ucapan.rate = 0.95;
            window.speechSynthesis.speak(ucapan);
        }

        function aktifkanAsisten() {
            asistenBerbicara("Asisten pintar ruangan diaktifkan. Memulai pembacaan data sensor.");
            document.getElementById('btnAktif').style.display = 'none';
        }

        function ambilDataSuhu() {
            fetch('/api/suhu')
                .then(response => response.json())
                .then(data => {
                    let nilaiSuhu = parseFloat(data.suhu);
                    if (!isNaN(nilaiSuhu)) {
                        document.getElementById('displaySuhu').innerText = nilaiSuhu.toFixed(2) + " °C";

                        // PANGGIL UPDATE GRAFIK
                        updateChartData(nilaiSuhu);

                        if (nilaiSuhu >= 32.0) {
                            document.getElementById('statusKondisi').innerText = "⚠️ PERINGATAN: RUANGAN TERLALU PANAS!";
                            document.getElementById('statusKondisi').style.color = "#d63031";
                            
                            if (!alarmSudahBunyi) {
                                asistenBerbicara("Peringatan, suhu ruangan melebihi batas normal. Saat ini suhu mencapai " + nilaiSuhu.toFixed(0) + " derajat Celcius.");
                                alarmSudahBunyi = true;
                            }
                        } else {
                            document.getElementById('statusKondisi').innerText = "✓ Suhu Ruangan Normal Sejuk.";
                            document.getElementById('statusKondisi').style.color = "#2ecc71";
                            alarmSudahBunyi = false;
                        }
                    }
                })
                .catch(err => console.log("Menghubungkan kembali..."));
        }
        
        setInterval(ambilDataSuhu, 3000);
    </script>
</body>
</html>
