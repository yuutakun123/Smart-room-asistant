<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Assistant Room Dashboard</title>
    <style>
        /* --- GLOBAL MODERN STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: #f4f6fc; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }

        /* --- MODERN DASHBOARD CONTAINER --- */
        .card { 
            background: #ffffff; 
            padding: 40px 35px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(78, 115, 223, 0.08); 
            max-width: 460px; 
            width: 100%; 
            border: 1px solid rgba(227, 230, 240, 0.8);
            text-align: center;
            transition: all 0.3s ease;
        }

        /* --- TITLES --- */
        h1 { 
            color: #1e293b; 
            font-size: 26px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px; 
        }
        .sub { 
            color: #94a3b8; 
            font-size: 13px; 
            font-weight: 500;
            margin-bottom: 35px; 
            line-height: 1.5;
        }

        /* --- FUTURISTIC GLASS-MORPHISM BOX --- */
        .suhu-box { 
            background: #f8fafc; 
            border-radius: 20px; 
            padding: 35px 20px; 
            border: 2px solid #e2e8f0; 
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }
        
        /* Aksen dekoratif tipis agar terlihat premium */
        .suhu-box::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #4e73df, #36b9cc);
        }

        /* --- TEMPERATURE DISPLAY --- */
        .suhu { 
            font-size: 68px; 
            font-weight: 800; 
            color: #0f172a; 
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 10px;
        }

        /* --- CONDITION STATUS --- */
        .status { 
            margin-top: 15px; 
            font-size: 14px; 
            color: #64748b; 
            font-weight: 700; 
            letter-spacing: 0.2px;
            padding: 8px 12px;
            background: #ffffff;
            border-radius: 30px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }

        /* --- PREMIUM INTERACTIVE BUTTON --- */
        .btn-suara { 
            margin-top: 30px; 
            background: linear-gradient(135deg, #4e73df 0%, #224abe 100%); 
            color: white; 
            border: none; 
            padding: 14px 28px; 
            border-radius: 14px; 
            cursor: pointer; 
            font-size: 14px; 
            font-weight: 700; 
            width: 100%;
            box-shadow: 0 8px 20px rgba(78, 115, 223, 0.3);
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }
        .btn-suara:hover { 
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(78, 115, 223, 0.4);
            background: linear-gradient(135deg, #2e59d9 0%, #224abe 100%);
        }
        .btn-suara:active {
            transform: translateY(1px);
        }
    </style>
    <script>
        let alarmSudahBunyi = false;

        function asistenBerbicara(teks) {
            let ucapan = new SpeechSynthesisUtterance(teks);
            ucapan.lang = 'id-ID';
            ucapan.rate = 0.95;
            window.speechSynthesis.speak(ucapan);
        }

        function aktifkanAsisten() {
            asistenBerbicara("Asisten pintar ruangan diaktifkan. Memulai pembacaan data sensor.");
            document.getElementById('btnAktif').style.display = 'none';
        }

        function ambilDataSuhu() {
            // Membaca data suhu secara langsung dari API backend Vercel tanpa proxy luar
            fetch('/api/suhu')
                .then(response => response.json())
                .then(data => {
                    let nilaiSuhu = parseFloat(data.suhu);
                    if (!isNaN(nilaiSuhu)) {
                        document.getElementById('displaySuhu').innerText = nilaiSuhu.toFixed(2) + " °C";

                        if (nilaiSuhu >= 32.0) {
                            document.getElementById('statusKondisi').innerText = "⚠️ PERINGATAN: RUANGAN TERLALU PANAS!";
                            document.getElementById('statusKondisi').style.color = "#d63031";
                            
                            if (!alarmSudahBunyi) {
                                asistenBerbicara("Peringatan, suhu ruangan melebihi batas normal. Saat ini suhu mencapai " + nilaiSuhu.toFixed(0) + " derajat Celcius.");
                                alarmSudahBunyi = true;
                            }
                        } else {
                            document.getElementById('statusKondisi').innerText = "✓ Suhu Ruangan Normal Sejuk.";
                            document.getElementById('statusKondisi').style.color = "#2ecc71";
                            alarmSudahBunyi = false;
                        }
                    }
                })
                .catch(err => console.log("Menghubungkan kembali..."));
        }
        setInterval(ambilDataSuhu, 3000);
    </script>
</head>
<body onload="ambilDataSuhu()">
    <div class="card">
        <h1>Smart Assistant Room</h1>
        <div class="sub">Sistem Pengendalian Nyata Berbasis Web IoT (Vercel)</div>
        <div class="suhu-box">
            <div class="suhu" id="displaySuhu">-- °C</div>
            <div class="status" id="statusKondisi">Menghubungkan ke server...</div>
        </div>
        <button class="btn-suara" id="btnAktif" onclick="aktifkanAsisten()">Klik untuk Aktifkan Suara Asisten</button>
    </div>
</body>
</html>
